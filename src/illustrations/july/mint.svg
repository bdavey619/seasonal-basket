<!-- Provisional botanical illustration — mint
     Original provisional artwork for the Seasonal prototype. Replaceable. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 220" fill="none" stroke="#1f2a24" stroke-linecap="round" stroke-linejoin="round" aria-label="Mint illustration">
  <!-- main stem -->
  <line x1="100" y1="205" x2="100" y2="90" stroke-width="1.6"/>
  <!-- terminal spike of florets -->
  <line x1="100" y1="90" x2="100" y2="50" stroke-width="1.3"/>
  <path d="M100 72 C92 68 86 63 84 57" stroke-width="1.1" opacity=".7"/>
  <path d="M100 72 C108 68 114 63 116 57" stroke-width="1.1" opacity=".7"/>
  <path d="M100 62 C94 58 90 54 90 48" stroke-width="1.1" opacity=".6"/>
  <path d="M100 62 C106 58 110 54 110 48" stroke-width="1.1" opacity=".6"/>
  <!-- small dots at branch tips (florets) -->
  <circle cx="84" cy="56" r="2" stroke-width="1.1"/>
  <circle cx="116" cy="56" r="2" stroke-width="1.1"/>
  <circle cx="90" cy="47" r="1.8" stroke-width="1.1"/>
  <circle cx="110" cy="47" r="1.8" stroke-width="1.1"/>
  <circle cx="100" cy="50" r="2" stroke-width="1.1"/>
  <!-- leaf pairs — serrated oval leaves, mint is wider than basil -->
  <!-- lower pair -->
  <path d="M100 178 C86 166 72 162 66 166 C70 178 84 184 100 178 Z" stroke-width="1.5"/>
  <path d="M100 178 C114 166 128 162 134 166 C130 178 116 184 100 178 Z" stroke-width="1.5"/>
  <!-- mid vein -->
  <line x1="100" y1="178" x2="67" y2="166" stroke-width=".8" opacity=".45"/>
  <line x1="100" y1="178" x2="133" y2="166" stroke-width=".8" opacity=".45"/>
  <!-- serration hints -->
  <path d="M82 170 C80 167 78 165 76 164" stroke-width=".9" opacity=".5"/>
  <path d="M90 174 C88 170 86 168 84 167" stroke-width=".9" opacity=".5"/>
  <path d="M118 170 C120 167 122 165 124 164" stroke-width=".9" opacity=".5"/>
  <path d="M110 174 C112 170 114 168 116 167" stroke-width=".9" opacity=".5"/>
  <!-- upper pair -->
  <path d="M100 145 C88 135 76 132 70 135 C74 145 86 150 100 145 Z" stroke-width="1.5"/>
  <path d="M100 145 C112 135 124 132 130 135 C126 145 114 150 100 145 Z" stroke-width="1.5"/>
  <line x1="100" y1="145" x2="71" y2="135" stroke-width=".8" opacity=".45"/>
  <line x1="100" y1="145" x2="129" y2="135" stroke-width=".8" opacity=".45"/>
  <!-- mid pair -->
  <path d="M100 115 C90 107 80 104 74 107 C78 115 88 120 100 115 Z" stroke-width="1.5"/>
  <path d="M100 115 C110 107 120 104 126 107 C122 115 112 120 100 115 Z" stroke-width="1.5"/>
  <line x1="100" y1="115" x2="75" y2="107" stroke-width=".8" opacity=".45"/>
  <line x1="100" y1="115" x2="125" y2="107" stroke-width=".8" opacity=".45"/>
</svg>
