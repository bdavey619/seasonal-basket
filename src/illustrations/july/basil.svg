           C127 128 129 128 130 130
           C131 133 128 137 122 141
           C115 146 107 149 101 147 Z"
        stroke-width="0.9"/>
  <path d="M101 147 C111 140 120 133 129 130" stroke-width="0.45" opacity="0.5"/>

  <!-- upper single leaf — one leaf more prominent than the other, slight turn -->
  <path d="M102 112
           C96 106 88 100 83 97
           C81 95 81 93 83 92
           C86 90 91 93 96 98
           C100 103 102 108 102 112 Z"
