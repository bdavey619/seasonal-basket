<!-- Provisional botanical illustration — basil
     Original provisional artwork for the Seasonal prototype.
     Field-guide register: observational, asymmetrical, thin line.
     Not a commissioned botanical plate. Replaceable. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" stroke="#1f2a24" stroke-linecap="round" stroke-linejoin="round" aria-label="Basil illustration">
  <!-- main stem — slight lean to the right, not perfectly vertical -->
  <path d="M97 220 C98 196 99 172 100 148 C101 124 102 104 103 86" stroke-width="0.85"/>

  <!-- lowest leaf pair — largest, widest spread, left leaf slightly lower -->
  <!-- left leaf -->
  <path d="M99 190
           C90 184 80 178 72 174
           C68 172 66 170 67 167
           C70 163 78 164 86 168
           C92 171 97 178 99 190 Z"
        stroke-width="0.9"/>
  <!-- left leaf mid-vein -->
  <path d="M99 190 C88 180 76 172 68 168" stroke-width="0.45" opacity="0.5"/>

  <!-- right leaf — slightly higher, a little smaller -->
  <path d="M100 184
           C108 178 118 170 127 164
           C131 161 134 160 135 163
           C136 166 132 170 125 174
           C118 178 108 182 100 184 Z"
        stroke-width="0.9"/>
  <!-- right leaf mid-vein -->
  <path d="M100 184 C112 175 123 167 133 163" stroke-width="0.45" opacity="0.5"/>

  <!-- middle leaf pair — smaller, leaves angled upward more -->
  <!-- left -->
  <path d="M100 152
           C92 146 82 140 75 136
           C72 134 71 132 73 130
           C76 127 82 130 89 135
           C94 139 98 146 100 152 Z"
        stroke-width="0.9"/>
  <path d="M100 152 C90 143 79 135 74 131" stroke-width="0.45" opacity="0.5"/>

