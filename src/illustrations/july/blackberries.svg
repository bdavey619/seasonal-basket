<!-- Provisional botanical illustration — blackberries
     Original provisional artwork for the Seasonal prototype.
     Field-guide register: observational, asymmetrical, thin line.
     Drupelets rendered as individual arc marks suggesting rounded surfaces.
     Not a commissioned botanical plate. Replaceable. -->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 240" fill="none" stroke="#1f2a24" stroke-linecap="round" stroke-linejoin="round" aria-label="Blackberry illustration">

  <!-- compound leaf — trifoliate, off to left on its own petiole -->
  <!-- petiole from stem base -->
  <path d="M96 90 C88 82 78 74 70 68" stroke-width="0.8"/>
  <!-- terminal leaflet -->
  <path d="M70 68 C66 60 60 54 56 52 C54 51 53 52 55 55 C57 58 62 62 68 67 C70 68 70 68 70 68 Z"
        stroke-width="0.8"/>
  <path d="M70 68 C64 61 58 54 55 52" stroke-width="0.38" opacity="0.45"/>
  <!-- right lateral leaflet -->
  <path d="M70 68 C76 64 82 62 86 62 C87 62 87 63 86 65 C83 67 77 68 70 68 Z"
        stroke-width="0.8"/>
  <!-- left lateral leaflet -->
  <path d="M70 68 C66 64 60 60 56 60 C55 60 55 61 56 63 C59 65 64 67 70 68 Z"
        stroke-width="0.8"/>

  <!-- main stem — from leaf junction down to calyx -->
  <path d="M96 90 C97 96 98 104 99 112" stroke-width="0.85"/>

  <!-- calyx — small spreading sepals at top of berry -->
  <path d="M99 112 C95 108 90 106 86 106" stroke-width="0.75"/>
  <path d="M99 112 C97 107 96 102 97 99" stroke-width="0.75"/>
  <path d="M99 112 C102 107 104 102 104 99" stroke-width="0.75"/>
  <path d="M99 112 C104 108 108 107 112 108" stroke-width="0.75"/>

  <!-- berry body — slightly irregular elongated oval, wider than it is tall -->
  <path d="M99 114
           C86 114 74 120 70 130
           C66 140 70 154 80 162
           C86 167 92 170 100 170
           C108 170 116 167 122 162
           C130 154 132 140 128 130
           C124 120 113 114 99 114 Z"
        stroke-width="1.0"/>

  <!-- drupelet marks — small arc strokes suggesting individual rounded surfaces -->
  <!-- think of each as seeing the top of one small sphere -->
  <!-- top zone, near calyx -->
  <path d="M88 122 C91 120 94 120 97 122" stroke-width="0.5" opacity="0.7"/>
  <path d="M100 120 C103 118 106 118 109 120" stroke-width="0.5" opacity="0.7"/>
  <path d="M112 124 C114 122 116 122 118 124" stroke-width="0.5" opacity="0.65"/>

  <!-- second row -->
  <path d="M76 132 C79 130 82 130 85 132" stroke-width="0.5" opacity="0.65"/>
  <path d="M88 130 C91 128 94 128 97 130" stroke-width="0.5" opacity="0.65"/>
  <path d="M100 128 C103 126 107 126 110 128" stroke-width="0.5" opacity="0.65"/>
  <path d="M113 130 C116 128 119 128 122 130" stroke-width="0.5" opacity="0.65"/>

  <!-- third row -->
  <path d="M74 142 C77 140 80 140 83 142" stroke-width="0.5" opacity="0.6"/>
  <path d="M86 140 C89 138 92 138 95 140" stroke-width="0.5" opacity="0.6"/>
  <path d="M98 138 C101 136 104 136 107 138" stroke-width="0.5" opacity="0.6"/>
  <path d="M110 140 C113 138 116 138 119 140" stroke-width="0.5" opacity="0.6"/>
  <path d="M123 142 C125 140 127 140 128 143" stroke-width="0.5" opacity="0.55"/>

  <!-- fourth row — lower, fewer visible -->
  <path d="M78 152 C81 150 84 150 87 152" stroke-width="0.5" opacity="0.55"/>
  <path d="M90 150 C93 148 96 148 99 150" stroke-width="0.5" opacity="0.55"/>
  <path d="M102 150 C105 148 108 148 111 150" stroke-width="0.5" opacity="0.55"/>
  <path d="M114 152 C116 150 119 150 122 152" stroke-width="0.5" opacity="0.5"/>

  <!-- bottom -->
  <path d="M87 162 C90 160 93 160 96 162" stroke-width="0.5" opacity="0.45"/>
  <path d="M100 162 C103 160 106 160 109 162" stroke-width="0.5" opacity="0.45"/>

</svg>
